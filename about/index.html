<style>
  .retro-stage {
    min-height: 72vh;
    display: grid;
    place-items: center;
    padding: 2rem 0 1rem;

  .crt-shell {
    width: 92vw;

    border: 2px solid #333;

    box-shadow:

  }

  .crt-titlebar {

  .crt-dot {

  .crt-dot--red { background: #ff5f56; }
  .crt-dot--yellow { background: #ffbd2e; }

  .crt-titlebar-text {

  .crt-screen {

    aspect-ratio: var(--crt-ratio, 16 / 10);
    overflow: hidden;
    border: 1px solid #222;
    border-radius: 8px;
    background: #0a0a0a;
    box-shadow:
      inset 0 0 60px rgba(0, 255, 65, 0.03),
      inset 0 0 4px rgba(0, 0, 0, 0.8);
  }

   
  .crt-scanlines {
    position: absolute;
    inset: 0;
    z-index: 10;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 0, 0, 0.15) 2px,
      rgba(0, 0, 0, 0.15) 4px
    );
    animation: crt-flicker 8s infinite;
  }

  .content-layer,
  .final-image {
    position: absolute;
    inset: 0;
  }

  .content-layer {
    z-index: 3;
    display: grid;
    align-content: start;
    gap: 0.5rem;
    padding: clamp(1rem, 3.6vw, 2rem);
    background: #0a0a0a;

  .typed-content {

    font-size: clamp(0.9rem, 2.2vw, 1.1rem);
    color: #00ff41;

  }

  .typed-content::after {
    content: "█";
    margin-left: 0.1ch;
    color: #00ff41;
    animation: blink 0.7s steps(1) infinite;
  }

  .final-image {
    z-index: 4;
    width: 100%;
    height: 100%;
    object-fit: cover;
    background: #000;
    opacity: 0;
    transform: scale(0);
    transform-origin: center center;
    transition: opacity 2000ms ease, transform 2000ms cubic-bezier(0.16, 1, 0.3, 1);
  }

  .crt-screen.show-image .content-layer {
    opacity: 0;
    pointer-events: none;
  }

  .crt-screen.show-image .final-image {
    opacity: 1;
    transform: scale(1);
  }

  .crt-screen.show-image .crt-scanlines {
    z-index: 0;
  }

  .char-span {
    display: inline;

  }

  .char-span.flash {

  @keyframes crt-flicker {

  @keyframes crt-power-on {

<script>
  (() => {
    const screen = document.getElementById('crt-screen');
    const shell = document.querySelector('.crt-shell');
    const typedContent = document.getElementById('typed-content');
    const finalImage = document.getElementById('final-image');

    if (!screen || !typedContent || !finalImage || !shell) {
      return;
    }

    const fullText = "\n云计算工程师，80后，唯物主义者，博客内容不分享技术，只记录生活所见所想，分享有趣的事物与人文艺术。";

    const applyImageSizing = () => {
      const w = finalImage.naturalWidth;
      const h = finalImage.naturalHeight;
      if (!w || !h) {
        return;
      }
      screen.style.setProperty('--crt-ratio', `${w} / ${h}`);
      shell.style.maxWidth = `${w}px`;
    };

    if (finalImage.complete) {
      applyImageSizing();
    } else {
      finalImage.addEventListener('load', applyImageSizing, { once: true });
    }

    let audioCtx = null;
    let soundEnabled = false;
    let lastBeepTime = 0;

    const ensureAudio = async () => {
      if (!audioCtx) {
        const AudioContextRef = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextRef) {
          return false;
        }
        audioCtx = new AudioContextRef();
      }

      if (audioCtx.state === 'suspended') {
        await audioCtx.resume();
      }

      soundEnabled = audioCtx.state === 'running';
      return soundEnabled;
    };

    const beep = () => {
      if (!soundEnabled || !audioCtx) {
        return;
      }

      const now = audioCtx.currentTime;
      if (now - lastBeepTime < 0.018) {
        return;
      }
      lastBeepTime = now;

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'square';
      osc.frequency.value = 520 + Math.random() * 380;
      gain.gain.setValueAtTime(0.02, now);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.03);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + 0.032);
    };

    const typeText = async () => {
      const chars = Array.from(fullText || '');
      typedContent.innerHTML = '';

      for (let i = 0; i < chars.length; i += 1) {
        const ch = chars[i];
        const span = document.createElement('span');
        span.className = 'char-span';
        span.textContent = ch;
        typedContent.appendChild(span);

        if (!/\s/.test(ch)) {
          beep();
          span.classList.add('flash');
          setTimeout(() => span.classList.remove('flash'), 200);
        }

        await new Promise((resolve) => setTimeout(resolve, 500));
      }

      await new Promise((resolve) => setTimeout(resolve, 900));
      screen.classList.add('show-image');
    };

    const boot = async () => {
      await typeText();
    };

    screen.addEventListener('pointerdown', () => {
      ensureAudio().catch(() => {
        soundEnabled = false;
      });
    }, { once: true });

    boot();
  })();
</script>





<div id="post-music-youtube-player" aria-hidden="true" style="position:fixed;left:-200px;bottom:0;width:200px;height:200px;pointer-events:none;overflow:hidden;"></div>

<button
    id="post-music-toggle"
    class="music-toggle-btn"
    type="button"
    data-music-url="https://music.youtube.com/watch?v=YvwkhHWBcl8"
    data-music-type="youtube"
    data-music-loop="false"
    aria-label="Play music"
    aria-pressed="false"
    title="Play music"
>
    <span class="music-icon music-icon-play" aria-hidden="true"></span>
</button>
<script>
    (function () {
        var toggle = document.getElementById('post-music-toggle');
        var audioPlayer = document.getElementById('post-music-player');
        var youtubeMount = document.getElementById('post-music-youtube-player');
        var musicUrl = toggle ? (toggle.dataset.musicUrl || '') : '';
        var musicType = toggle ? (toggle.dataset.musicType || 'audio') : 'audio';
        var loopEnabled = toggle ? toggle.dataset.musicLoop === 'true' : false;
        var iconClass = 'music-icon-play';
        var youtubePlayer = null;
        var youtubeReady = false;
        var pendingYoutubePlay = false;
        var creatingYouTubePlayer = false;

        if (!toggle) {
            return;
        }

        if (musicType === 'audio' && !audioPlayer) {
            return;
        }

        function setButtonState(isPlaying) {
            var icon = toggle.querySelector('.music-icon');

            toggle.setAttribute('aria-pressed', String(isPlaying));
            toggle.setAttribute('aria-label', isPlaying ? 'Pause music' : 'Play music');
            toggle.setAttribute('title', isPlaying ? 'Pause music' : 'Play music');

            if (!icon) {
                return;
            }

            icon.classList.remove(iconClass);
            iconClass = isPlaying ? 'music-icon-pause' : 'music-icon-play';
            icon.classList.add(iconClass);
        }

        function extractYouTubeVideoId(url) {
            var match = url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([A-Za-z0-9_-]{11})/);
            return match ? match[1] : '';
        }

        function loadYouTubeApi(onReady) {
            if (window.YT && window.YT.Player) {
                onReady();
                return;
            }

            var existing = window.onYouTubeIframeAPIReady;
            window.onYouTubeIframeAPIReady = function () {
                if (typeof existing === 'function') {
                    existing();
                }
                onReady();
            };

            if (document.getElementById('youtube-iframe-api')) {
                return;
            }

            var script = document.createElement('script');
            script.id = 'youtube-iframe-api';
            script.src = 'https://www.youtube.com/iframe_api';
            document.head.appendChild(script);
        }

        function ensureYouTubePlayer(onReady) {
            var videoId = extractYouTubeVideoId(musicUrl);

            if (!videoId || !youtubeMount) {
                return;
            }

            if (youtubeReady && youtubePlayer) {
                onReady();
                return;
            }

            if (creatingYouTubePlayer) {
                return;
            }

            creatingYouTubePlayer = true;

            loadYouTubeApi(function () {
                youtubePlayer = new window.YT.Player('post-music-youtube-player', {
                    width: '200',
                    height: '200',
                    videoId: videoId,
                    playerVars: {
                        autoplay: 0,
                        controls: 0,
                        rel: 0,
                        playsinline: 1,
                        modestbranding: 1,
                        loop: loopEnabled ? 1 : 0,
                        playlist: loopEnabled ? videoId : undefined
                    },
                    events: {
                        onReady: function () {
                            youtubeReady = true;
                            creatingYouTubePlayer = false;
                            onReady();
                            if (pendingYoutubePlay) {
                                pendingYoutubePlay = false;
                                youtubePlayer.playVideo();
                            }
                        },
                        onStateChange: function (event) {
                            if (event.data === window.YT.PlayerState.PLAYING) {
                                setButtonState(true);
                            }

                            if (
                                event.data === window.YT.PlayerState.PAUSED ||
                                event.data === window.YT.PlayerState.ENDED
                            ) {
                                setButtonState(false);
                            }
                        }
                    }
                });
            });
        }

        setButtonState(false);

        if (musicType === 'youtube') {
            ensureYouTubePlayer(function () {
                toggle.classList.add('music-toggle-ready');
                toggle.setAttribute('title', 'Play music');
            });
        }

        toggle.addEventListener('click', function () {
            if (musicType === 'youtube') {
                if (!youtubeReady || !youtubePlayer) {
                    pendingYoutubePlay = true;
                    toggle.setAttribute('title', 'Loading music... tap again');
                    ensureYouTubePlayer(function () {
                        toggle.setAttribute('title', 'Play music');
                    });
                    return;
                }

                if (youtubePlayer.getPlayerState() === window.YT.PlayerState.PLAYING) {
                    youtubePlayer.pauseVideo();
                } else {
                    pendingYoutubePlay = false;
                    youtubePlayer.playVideo();
                }
                return;
            }

            if (audioPlayer.paused) {
                audioPlayer.play();
            } else {
                audioPlayer.pause();
            }
        });

        if (audioPlayer) {
            audioPlayer.addEventListener('play', function () {
                setButtonState(true);
            });

            audioPlayer.addEventListener('pause', function () {
                setButtonState(false);
            });

            audioPlayer.addEventListener('ended', function () {
                setButtonState(false);
            });
        }
    })();
</script>
